# Generic worker Deployment. up.sh substitutes __CA_BUNDLES__ and __SIGNER__
# with the values printed by publish.py, then applies the rendered manifest.
#
# The pod reads the published bundle from /cas (a hostPath onto the k3d node dir
# that `k3d cluster create --volume <host>:/cas` bind-mounts from the host). The
# bundle is content-addressed and signed; the worker verifies it against
# CA_BUNDLE_ALLOWED_SIGNERS before accepting any task.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ca-cad-worker
spec:
  replicas: 1
  selector:
    matchLabels: {app: ca-cad-worker}
  template:
    metadata:
      labels: {app: ca-cad-worker}
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: worker
          image: ca-worker:cad-demo
          imagePullPolicy: Never   # imported via `k3d image import`
          env:
            - name: TEMPORAL_ADDRESS
              value: host.k3d.internal:7233
            - name: TEMPORAL_TASK_QUEUE
              value: ca-cad-demo
            - name: WORKER_GRACEFUL_SHUTDOWN_S
              value: "20"
            - name: STORE_URL
              value: file:///cas
            - name: CA_BUNDLES
              value: "__CA_BUNDLES__"
            - name: CA_BUNDLE_ALLOWED_SIGNERS
              value: "__SIGNER__"
            - name: CA_BUNDLE_NATIVE_EXEC   # P2 native in-process exec is dev-gated
              value: "1"
          volumeMounts:
            - name: cas
              mountPath: /cas
              readOnly: true
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 5
          readinessProbe:
            httpGet: {path: /readyz, port: health}
            periodSeconds: 2
      volumes:
        - name: cas
          hostPath:
            path: /cas
            type: Directory
