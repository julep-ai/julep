# Generic worker Deployment. up.sh substitutes __JULEP_BUNDLES__ and __SIGNER__
# with the values printed by publish.py, then applies the rendered manifest.
#
# The pod reads the published bundle from /artifacts (a hostPath onto the k3d node dir
# that `k3d cluster create --volume <host>:/artifacts` bind-mounts from the host). The
# bundle is content-addressed and signed; the worker verifies it against
# JULEP_BUNDLE_ALLOWED_SIGNERS before accepting any task.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: julep-cad-worker
spec:
  replicas: 1
  selector:
    matchLabels: {app: julep-cad-worker}
  template:
    metadata:
      labels: {app: julep-cad-worker}
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: worker
          image: julep-worker:cad-demo
          imagePullPolicy: Never   # imported via `k3d image import`
          env:
            - name: TEMPORAL_ADDRESS
              value: host.k3d.internal:7233
            - name: TEMPORAL_TASK_QUEUE
              value: julep-cad-demo
            - name: WORKER_GRACEFUL_SHUTDOWN_S
              value: "20"
            - name: JULEP_ARTIFACT_STORE_URL
              value: file:///artifacts
            - name: JULEP_BUNDLES
              value: "__JULEP_BUNDLES__"
            - name: JULEP_BUNDLE_ALLOWED_SIGNERS
              value: "__SIGNER__"
            # Native dependency tier grant (P4): comma-separated pure names allowed
            # to use the uv-venv native tier for deps with no WASI wheel. Empty/unset
            # = no native grant = bundle pures run wasm-only. Off by default.
            # - name: JULEP_PURE_NATIVE_DEPS
            #   value: "my.pkg.heavy_pure,other.pure"
            # P3: bundle-sourced pures run in the wasmtime sandbox (not natively
            # in-process), so resolution is ungated -- the old P2 dev-only
            # JULEP_BUNDLE_NATIVE_EXEC=1 flag is gone.
          volumeMounts:
            - name: artifacts
              mountPath: /artifacts
              readOnly: true
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 5
          readinessProbe:
            httpGet: {path: /readyz, port: health}
            periodSeconds: 2
      volumes:
        - name: artifacts
          hostPath:
            path: /artifacts
            type: Directory
