# Generic code-as-data worker on EKS, zero docker in the per-flow loop.
#
# The image (__IMAGE__) is the framework runtime image built once from
# tooling/runtime-image/Dockerfile -- it holds NO flow code. The grade-scores
# flow + its three custom pures arrive as a signed artifact store bundle read from S3
# (JULEP_ARTIFACT_STORE_URL) at startup; the worker verifies the bundle against
# JULEP_BUNDLE_ALLOWED_SIGNERS, then runs the pures in the P3 wasm sandbox.
#
# up.sh substitutes __IMAGE__ / __STORE_URL__ / __JULEP_BUNDLES__ / __SIGNER__.
# The pod reads S3 with creds from the `aws-artifacts-creds` secret (the EKS node role
# has no S3 access). KEDA's temporal scaler drives 0 -> N -> 0 on queue backlog.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: julep-cad-worker
  namespace: julep-demo
  labels: {app: julep-cad-worker}
spec:
  replicas: 0          # KEDA owns the replica count (scale-from-zero)
  selector:
    matchLabels: {app: julep-cad-worker}
  template:
    metadata:
      labels: {app: julep-cad-worker}
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: worker
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal-frontend.temporal.svc.cluster.local:7233
            - name: TEMPORAL_TASK_QUEUE
              value: julep-cad-demo
            - name: WORKER_GRACEFUL_SHUTDOWN_S
              value: "20"
            - name: JULEP_ARTIFACT_STORE_URL
              value: __STORE_URL__
            - name: JULEP_BUNDLES
              value: "__JULEP_BUNDLES__"
            - name: JULEP_BUNDLE_ALLOWED_SIGNERS
              value: "__SIGNER__"
            # Native dependency tier grant (P4): comma-separated pure names allowed
            # to use the uv-venv native tier for deps with no WASI wheel. Empty/unset
            # = no native grant = bundle pures run wasm-only. Off by default.
            # - name: JULEP_PURE_NATIVE_DEPS
            #   value: "my.pkg.heavy_pure,other.pure"
            - name: AWS_DEFAULT_REGION
              value: us-east-1
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef: {name: aws-artifacts-creds, key: AWS_ACCESS_KEY_ID}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef: {name: aws-artifacts-creds, key: AWS_SECRET_ACCESS_KEY}
          ports:
            - {containerPort: 8080, name: health}
          # A dep'd-pure bundle ships a wasm env component; the worker must
          # cold-compile it (cranelift) at startup on first resolution, which is
          # CPU-heavy and currently blocks the asyncio health loop (see TODOS:
          # "env-component compile blocks the health event loop"). The
          # startupProbe gives that cold compile a generous window before
          # liveness/readiness engage, so the pod is not SIGTERM'd mid-compile.
          # No-dep bundles compile nothing extra and pass startup immediately.
          startupProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 5
            failureThreshold: 40   # ~200s grace for a cold env-component compile
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 5
          readinessProbe:
            httpGet: {path: /readyz, port: health}
            periodSeconds: 2
          resources:
            # Burst headroom so the cold env-component compile finishes quickly;
            # request stays modest so it schedules on a small node.
            requests: {cpu: 400m, memory: 768Mi}
            limits: {cpu: "1700m", memory: 2500Mi}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: julep-cad-worker
  namespace: julep-demo
spec:
  scaleTargetRef:
    name: julep-cad-worker
  minReplicaCount: 0
  maxReplicaCount: 4
  pollingInterval: 5
  cooldownPeriod: 30
  triggers:
    - type: temporal
      metadata:
        endpoint: temporal-frontend.temporal.svc.cluster.local:7233
        namespace: default
        taskQueue: julep-cad-demo
        queueTypes: "workflow,activity"
        targetQueueSize: "1"
        activationTargetQueueSize: "0"
