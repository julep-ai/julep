apiVersion: apps/v1
kind: Deployment
metadata:
  name: julep-worker
spec:
  replicas: 0                      # KEDA owns the count
  selector:
    matchLabels: {app: julep-worker}
  template:
    metadata:
      labels: {app: julep-worker}
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: worker
          image: julep-worker:demo
          imagePullPolicy: Never   # image lives in the host dockerd
          env:
            - name: TEMPORAL_ADDRESS
              value: 10.42.0.1:7233
            - name: TEMPORAL_TASK_QUEUE
              value: julep
            - name: WORKER_GRACEFUL_SHUTDOWN_S
              value: "10"
            - name: WORKER_MAX_CONCURRENT_ACTIVITIES
              value: "4"
            # Code-as-data (P3 wasm tier): to run bundle-sourced pures, point the
            # worker at the CAS store and pin the signed bundle + allowed signers.
            # Bundle pures execute in the wasmtime sandbox (image needs the `wasm`
            # extra); resolution is ungated (no JULEP_BUNDLE_NATIVE_EXEC in P3).
            # - name: STORE_URL
            #   value: s3://my-julep-bundles            # or file:///cas for a hostPath
            # - name: JULEP_BUNDLES
            #   value: "<bundleHash>:<signatureDigest>"
            # - name: JULEP_BUNDLE_ALLOWED_SIGNERS
            #   value: "<ed25519-public-key-hex>"
            # Native dependency tier grant (P4): comma-separated pure names allowed
            # to use the uv-venv native tier for deps with no WASI wheel. Empty/unset
            # = no native grant = bundle pures run wasm-only. Off by default.
            # - name: JULEP_PURE_NATIVE_DEPS
            #   value: "my.pkg.heavy_pure,other.pure"
          ports:
            - containerPort: 8080
              name: health
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 5
          readinessProbe:
            httpGet: {path: /readyz, port: health}
            periodSeconds: 2
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: julep-worker
spec:
  scaleTargetRef:
    name: julep-worker
  minReplicaCount: 0
  maxReplicaCount: 4
  pollingInterval: 5
  cooldownPeriod: 30
  triggers:
    - type: temporal
      metadata:
        endpoint: 10.42.0.1:7233
        namespace: default
        taskQueue: julep
        queueTypes: "workflow,activity"
        targetQueueSize: "2"
        activationTargetQueueSize: "0"
