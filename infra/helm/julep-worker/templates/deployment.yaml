apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: julep-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
    julep.ai/lane: {{ .Values.worker.lane | quote }}
  annotations:
    julep.ai/application: {{ .Values.worker.application | quote }}
    julep.ai/lane: {{ .Values.worker.lane | quote }}
    julep.ai/release-hash: {{ .Values.worker.releaseHash | quote }}
    julep.ai/application-artifact-hash: {{ .Values.worker.applicationArtifactHash | quote }}
    julep.ai/deployment-revision: {{ .Values.worker.deploymentRevision | quote }}
    julep.ai/deployment-config-hash: {{ .Values.worker.deploymentConfigHash | quote }}
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: julep-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: julep-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
        julep.ai/lane: {{ .Values.worker.lane | quote }}
      annotations:
        julep.ai/application: {{ .Values.worker.application | quote }}
        julep.ai/lane: {{ .Values.worker.lane | quote }}
        julep.ai/release-hash: {{ .Values.worker.releaseHash | quote }}
        julep.ai/application-artifact-hash: {{ .Values.worker.applicationArtifactHash | quote }}
        julep.ai/deployment-revision: {{ .Values.worker.deploymentRevision | quote }}
        julep.ai/deployment-config-hash: {{ .Values.worker.deploymentConfigHash | quote }}
    spec:
      serviceAccountName: {{ default .Release.Name .Values.serviceAccount.name | quote }}
      {{ if .Values.worker.priorityClassName }}
      priorityClassName: {{ .Values.worker.priorityClassName | quote }}
      {{ end }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          {{ if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{ else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{ if .Values.worker.applicationSpec }}
            - name: WORKER_APPLICATION
              value: {{ .Values.worker.applicationSpec | quote }}
            - name: WORKER_RUNTIME_DECLARATIONS_HASH
              value: {{ required "worker.runtimeDeclarationsHash is required with worker.applicationSpec" .Values.worker.runtimeDeclarationsHash | quote }}
            {{ end }}
            - name: WORKER_CONTEXT_FACTORY
              value: {{ required "worker.contextFactory is required" .Values.worker.contextFactory | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporal.address | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TEMPORAL_TASK_QUEUE
              value: {{ .Values.temporal.taskQueue | quote }}
            - name: WORKER_HEALTH_PORT
              value: {{ .Values.worker.healthPort | quote }}
            - name: WORKER_GRACEFUL_SHUTDOWN_S
              value: {{ .Values.worker.gracefulShutdownSeconds | quote }}
            - name: WORKER_MAX_CONCURRENT_ACTIVITIES
              value: {{ .Values.worker.maxConcurrentActivities | quote }}
            - name: TEMPORAL_PAYLOAD_ENCRYPTION_REQUIRED
              value: {{ .Values.payloadEncryption.required | quote }}
            {{ if .Values.worker.useWorkerVersioning }}
            - name: JULEP_WORKER_VERSIONING
              value: "1"
            {{ end }}
            {{ if .Values.worker.buildId }}
            - name: JULEP_WORKER_BUILD_ID
              value: {{ .Values.worker.buildId | quote }}
            {{ end }}
            {{ if .Values.worker.secretName }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.secretName | quote }}
                  key: ANTHROPIC_API_KEY
            {{ end }}
            {{ if .Values.payloadEncryption.enabled }}
            - name: TEMPORAL_PAYLOAD_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ required "payloadEncryption.secretName is required when payload encryption is enabled" .Values.payloadEncryption.secretName | quote }}
                  key: {{ .Values.payloadEncryption.keyringKey | quote }}
            - name: TEMPORAL_PAYLOAD_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ required "payloadEncryption.secretName is required when payload encryption is enabled" .Values.payloadEncryption.secretName | quote }}
                  key: {{ .Values.payloadEncryption.activeKeyIdKey | quote }}
            {{ end }}
            {{ range $name, $value := .Values.worker.environment }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
            {{ end }}
            {{ range $name, $source := .Values.worker.secretEnvironment }}
            - name: {{ $name | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ $source.secretName | quote }}
                  key: {{ $source.key | quote }}
            {{ end }}
          ports:
            - containerPort: {{ .Values.worker.healthPort }}
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            periodSeconds: 2
          resources:
{{ toYaml .Values.resources | indent 12 }}
