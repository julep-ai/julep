apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-smoke
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/name: julep-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
    julep.ai/lane: {{ .Values.worker.lane | quote }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: 90
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: julep-worker-smoke
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ default .Release.Name .Values.serviceAccount.name | quote }}
      restartPolicy: Never
      containers:
        - name: worker-smoke
          {{ if .Values.image.digest }}
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          {{ else }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          {{ end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["julep"]
          args: ["worker", "--smoke-test-seconds", "3"]
          env:
            {{ if .Values.worker.applicationSpec }}
            - name: WORKER_APPLICATION
              value: {{ .Values.worker.applicationSpec | quote }}
            - name: WORKER_RUNTIME_DECLARATIONS_HASH
              value: {{ required "worker.runtimeDeclarationsHash is required with worker.applicationSpec" .Values.worker.runtimeDeclarationsHash | quote }}
            {{ end }}
            - name: WORKER_CONTEXT_FACTORY
              value: {{ required "worker.contextFactory is required" .Values.worker.contextFactory | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ .Values.temporal.address | quote }}
            - name: TEMPORAL_NAMESPACE
              value: {{ .Values.temporal.namespace | quote }}
            - name: TEMPORAL_TASK_QUEUE
              value: {{ printf "%s-smoke" .Values.temporal.taskQueue | quote }}
            - name: WORKER_GRACEFUL_SHUTDOWN_S
              value: {{ .Values.worker.gracefulShutdownSeconds | quote }}
            - name: WORKER_MAX_CONCURRENT_ACTIVITIES
              value: "1"
            - name: TEMPORAL_PAYLOAD_ENCRYPTION_REQUIRED
              value: {{ .Values.payloadEncryption.required | quote }}
            {{ if .Values.worker.useWorkerVersioning }}
            - name: CA_WORKER_VERSIONING
              value: "1"
            {{ end }}
            {{ if .Values.worker.buildId }}
            - name: CA_WORKER_BUILD_ID
              value: {{ .Values.worker.buildId | quote }}
            {{ end }}
            {{ if .Values.worker.secretName }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worker.secretName | quote }}
                  key: ANTHROPIC_API_KEY
            {{ end }}
            {{ if .Values.payloadEncryption.enabled }}
            - name: TEMPORAL_PAYLOAD_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.payloadEncryption.secretName | quote }}
                  key: {{ .Values.payloadEncryption.keyringKey | quote }}
            - name: TEMPORAL_PAYLOAD_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.payloadEncryption.secretName | quote }}
                  key: {{ .Values.payloadEncryption.activeKeyIdKey | quote }}
            {{ end }}
            {{ range $name, $value := .Values.worker.environment }}
            - name: {{ $name | quote }}
              value: {{ $value | quote }}
            {{ end }}
            {{ range $name, $source := .Values.worker.secretEnvironment }}
            - name: {{ $name | quote }}
              valueFrom:
                secretKeyRef:
                  name: {{ $source.secretName | quote }}
                  key: {{ $source.key | quote }}
            {{ end }}
