name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools
        run: python -m pip install -e '.[dev]'
      - name: Ruff
        run: ruff check composable_agents
      - name: Mypy
        run: python -m mypy --no-incremental --cache-dir=/dev/null composable_agents

  # Bare install with NO optional extras. Guards against a core module growing an
  # unconditional import of an optional dependency (temporalio, wasmtime,
  # cryptography, dbos, jinja2, opentelemetry, ...). The temporal=off test job
  # installs the test-no-temporal extra and so no longer exercises this path.
  bare-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install base package only
        run: python -m pip install -e .
      - name: Public package import must not require any optional extra
        run: python -c "import composable_agents as c; assert c.HAVE_TEMPORAL is False"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        temporal: ["off", "on"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package without Temporal
        if: matrix.temporal == 'off'
        run: python -m pip install -e '.[test-no-temporal]'
      - name: Assert Temporal is absent
        if: matrix.temporal == 'off'
        run: python -c "import composable_agents as c; assert c.HAVE_TEMPORAL is False"
      - name: Install package with dev extras
        if: matrix.temporal == 'on'
        run: python -m pip install -e '.[dev]'
      - name: Assert Temporal is present
        if: matrix.temporal == 'on'
        run: python -c "import composable_agents as c; assert c.HAVE_TEMPORAL is True"
      - name: Pytest
        run: python -m pytest -q
